name: AUS — Security Audit

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run npm audit
        id: audit
        run: |
          npm audit --json > audit.json 2>&1 || true
          TOTAL=$(node -e "try{const a=require('./audit.json');console.log(a.metadata?.vulnerabilities?.total??0)}catch{console.log(0)}")
          echo "vuln_count=$TOTAL" >> $GITHUB_OUTPUT
          echo "Found $TOTAL vulnerabilities"

      - name: Apply auto-fix
        if: steps.audit.outputs.vuln_count != '0'
        run: npm audit fix

      - name: Create PR
        if: steps.audit.outputs.vuln_count != '0'
        uses: peter-evans/create-pull-request@v6
        id: pr
        with:
          commit-message: "fix(deps): npm audit fix — AUS auto-patch"
          title: "[AUS] Security audit: ${{ steps.audit.outputs.vuln_count }} vulnerabilities patched"
          body: |
            Auto-generated by **AUS (Auto Update Security)**.

            `npm audit fix` was applied. Review changes and merge to deploy security patches.

            > Triggered by weekly scheduled audit on `${{ github.ref_name }}`.
          branch: aus/security-audit
          delete-branch: true
          labels: "security,aus"

      - name: Discord — vulnerabilities found
        if: steps.audit.outputs.vuln_count != '0' && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -sf -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"AUS: ${{ steps.audit.outputs.vuln_count }} Vulnerabilities Found\",\"color\":16777215,\"description\":\"Auto-fix PR created. Review and merge on GitHub.\",\"footer\":{\"text\":\"AUS — Auto Update Security · kristiansen.icu\"}}]}" \
            "$DISCORD_WEBHOOK_URL"

      - name: Discord — all clear
        if: steps.audit.outputs.vuln_count == '0' && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -sf -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"AUS: No Vulnerabilities\",\"color\":16777215,\"description\":\"Weekly audit passed clean.\",\"footer\":{\"text\":\"AUS — Auto Update Security · kristiansen.icu\"}}]}" \
            "$DISCORD_WEBHOOK_URL"
